name: Continuous Integration

on:
  pull_request:
  push:
    branches: ["main", "feature/async-research-cli"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIENG_FinalProject/topic-4-research-assistant

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: AIENG_FinalProject/topic-4-research-assistant/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing -q
