name: Docker Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIENG_FinalProject/topic-4-research-assistant

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t async-research-assistant:ci .
